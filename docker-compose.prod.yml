version: "3.9"

services:
  # ------------------------------
  # RESTAURANT SERVICE (2 instances)
  # ------------------------------
  restaurant-service-1:
    build: ./services/restaurant-service
    container_name: restaurant-service-1
    environment:
      - PORT=3001
      - SERVICE_NAME=restaurant-service
      - LOG_LEVEL=info
    networks:
      - quickeat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      retries: 3

  restaurant-service-2:
    build: ./services/restaurant-service
    container_name: restaurant-service-2
    environment:
      - PORT=3005
      - SERVICE_NAME=restaurant-service
      - LOG_LEVEL=info
    networks:
      - quickeat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      retries: 3

  # ------------------------------
  # MENU SERVICE (2 instances)
  # ------------------------------
  menu-service-1:
    build: ./services/menu-service
    container_name: menu-service-1
    environment:
      - PORT=3002
      - SERVICE_NAME=menu-service
      - LOG_LEVEL=info
      - RESTAURANT_SERVICE_URL=http://restaurant-service-1:3001
    networks:
      - quickeat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      retries: 3

  menu-service-2:
    build: ./services/menu-service
    container_name: menu-service-2
    environment:
      - PORT=3006
      - SERVICE_NAME=menu-service
      - LOG_LEVEL=info
      - RESTAURANT_SERVICE_URL=http://restaurant-service-2:3005
    networks:
      - quickeat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 10s
      retries: 3

  # ------------------------------
  # ORDER SERVICE (2 instances)
  # ------------------------------
  order-service-1:
    build: ./services/order-service
    container_name: order-service-1
    environment:
      - PORT=3003
      - SERVICE_NAME=order-service
      - LOG_LEVEL=info
      - RESTAURANT_SERVICE_URL=http://restaurant-service-1:3001
      - MENU_SERVICE_URL=http://menu-service-1:3002
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
    networks:
      - quickeat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      retries: 3

  order-service-2:
    build: ./services/order-service
    container_name: order-service-2
    environment:
      - PORT=3007
      - SERVICE_NAME=order-service
      - LOG_LEVEL=info
      - RESTAURANT_SERVICE_URL=http://restaurant-service-2:3005
      - MENU_SERVICE_URL=http://menu-service-2:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
    networks:
      - quickeat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 10s
      retries: 3

  # ------------------------------
  # NOTIFICATION SERVICE
  # ------------------------------
  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    environment:
      - PORT=3004
      - SERVICE_NAME=notification-service
      - LOG_LEVEL=info
    networks:
      - quickeat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      retries: 3

  # ------------------------------
  # API GATEWAY
  # ------------------------------
  gateway:
    build: ./gateway
    container_name: api-gateway
    environment:
      - PORT=4000
      - LOG_LEVEL=info
      - JWT_SECRET=changeme
      - RESTAURANT_SERVICE_URL=http://nginx:8080
      - MENU_SERVICE_URL=http://nginx:8080
      - ORDER_SERVICE_URL=http://nginx:8080
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
    networks:
      - quickeat-network
    ports:
      - "4000:4000"
    depends_on:
      - restaurant-service-1
      - restaurant-service-2
      - menu-service-1
      - menu-service-2
      - order-service-1
      - order-service-2
      - notification-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      retries: 3

  # ------------------------------
  # NGINX LOAD BALANCER
  # ------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx-loadbalancer
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - quickeat-network
    depends_on:
      - restaurant-service-1
      - restaurant-service-2
      - menu-service-1
      - menu-service-2
      - order-service-1
      - order-service-2

networks:
  quickeat-network:
    external: true